<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Monk Mode | Трекер</title>
    <link rel="manifest" href="manifest.json" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  </head>
  <body class="cloud-tunnel text-white font-sans">
    <main
      id="app-container"
      class="holographic-glass app-wrapper relative z-10 flex flex-col p-6 shadow-2xl"
    >
      <header class="mb-4 flex-shrink-0">
        <div class="flex justify-between items-start mb-2">
          <div class="pt-2">
            <h1
              class="text-2xl font-bold tracking-wider uppercase leading-none"
            >
              Monk Mode
            </h1>
            <p
              class="text-[10px] opacity-50 uppercase tracking-[0.2em] mt-1"
              id="current-date"
            >
              Загрузка...
            </p>
          </div>

          <div class="text-right">
            <div
              class="flex justify-end items-center gap-3 cursor-pointer group active:scale-95 transition-transform"
              id="btn-stats"
            >
              <span
                class="text-3xl font-black text-teal-300 drop-shadow-[0_0_10px_rgba(45,212,191,0.3)]"
                id="total-xp"
                >0</span
              >
              <div
                class="bg-white/10 p-2.5 rounded-2xl border border-white/10 group-hover:bg-white/20 transition-colors"
              >
                <i class="ph ph-chart-line-up text-xl text-teal-300"></i>
              </div>
            </div>
            <span
              class="text-[9px] opacity-40 block uppercase tracking-[0.3em] mt-1 pr-14"
              >Total Experience</span
            >
          </div>
        </div>

        <div
          class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden backdrop-blur-sm mt-6"
        >
          <div
            id="progress-fill"
            class="h-full bg-gradient-to-r from-teal-400 to-emerald-400 w-0 rounded-full transition-all duration-700"
          ></div>
        </div>
        <div class="flex justify-between items-center mt-2">
          <p
            class="text-[9px] opacity-50 uppercase tracking-widest"
            id="daily-progress-text"
          >
            0% выполнено
          </p>
          <p class="text-[9px] opacity-50 uppercase tracking-widest">
            Дисциплина дня
          </p>
        </div>
      </header>

      <div class="flex-1 custom-scrollbar pr-1 pb-4" id="habits-list"></div>

      <footer class="mt-2 flex-shrink-0 pt-2">
        <button
          id="btn-add"
          class="w-full bg-teal-500/80 active:bg-teal-400 py-4 rounded-2xl flex justify-center items-center gap-3 text-sm font-black uppercase tracking-widest transition-all shadow-[0_10px_30px_rgba(45,212,191,0.2)] active:scale-95"
        >
          <i class="ph-bold ph-plus text-xl"></i> Добавить активность
        </button>
      </footer>
    </main>

    <div
      id="modal"
      class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[70] hidden flex items-center justify-center p-6 opacity-0"
    >
      <div
        class="holographic-glass w-full max-w-sm rounded-[2.5rem] p-8 transform scale-95 shadow-3xl"
        id="modal-content"
      >
        <h2
          class="text-xl font-black mb-8 text-center uppercase tracking-widest"
          id="modal-title"
        >
          Настройка
        </h2>

        <div class="space-y-5">
          <div>
            <label
              class="text-[10px] uppercase opacity-40 ml-1 mb-2 block tracking-widest"
              >Название</label
            >
            <input
              type="text"
              id="habit-title"
              placeholder="Что нужно сделать?"
              class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white outline-none focus:border-teal-500/50 transition-colors placeholder:opacity-20"
            />
          </div>
          <div>
            <label
              class="text-[10px] uppercase opacity-40 ml-1 mb-2 block tracking-widest"
              >Ценность (XP)</label
            >
            <input
              type="number"
              id="habit-xp"
              placeholder="50"
              class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white outline-none focus:border-teal-500/50 transition-colors placeholder:opacity-20"
            />
          </div>
        </div>

        <div class="flex flex-col gap-3 mt-10">
          <button
            id="btn-save"
            class="w-full bg-teal-500 py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-transform"
          >
            Подтвердить
          </button>
          <div class="flex gap-3">
            <button
              id="btn-delete"
              class="hidden flex-1 bg-red-500/10 text-red-400 border border-red-500/20 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-colors"
            >
              Удалить
            </button>
            <button
              id="btn-cancel"
              class="flex-1 bg-white/5 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-colors"
            >
              Отмена
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      id="stats-modal"
      class="fixed inset-0 bg-black/90 backdrop-blur-2xl z-[60] hidden flex items-center justify-center p-6 opacity-0"
    >
      <div
        class="holographic-glass w-full max-w-sm rounded-[2.5rem] p-8 transform scale-95 shadow-3xl"
        id="stats-content"
      >
        <div class="flex justify-between items-center mb-10">
          <h2 class="text-2xl font-black uppercase tracking-tighter italic">
            Сводка
          </h2>
          <button
            id="btn-close-stats"
            class="text-white/30 hover:text-white transition-colors bg-white/5 p-2 rounded-full"
          >
            <i class="ph ph-x text-xl block"></i>
          </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
          <div
            class="bg-white/5 border border-white/5 rounded-3xl p-5 text-center"
          >
            <i class="ph-fill ph-check-circle text-teal-400 text-3xl mb-2"></i>
            <p class="text-3xl font-black" id="stat-completed">0</p>
            <p class="text-[9px] uppercase opacity-40 mt-1 tracking-widest">
              Задач
            </p>
          </div>
          <div
            class="bg-white/5 border border-white/5 rounded-3xl p-5 text-center"
          >
            <i
              class="ph-fill ph-calendar-check text-emerald-400 text-3xl mb-2"
            ></i>
            <p class="text-3xl font-black" id="stat-days">0</p>
            <p class="text-[9px] uppercase opacity-40 mt-1 tracking-widest">
              Дней
            </p>
          </div>
          <div
            class="col-span-2 bg-gradient-to-br from-teal-500/20 to-emerald-500/10 border border-teal-500/20 rounded-[2rem] p-8 text-center relative overflow-hidden"
          >
            <i
              class="ph-fill ph-lightning text-teal-300 text-5xl mb-3 relative z-10"
            ></i>
            <p
              class="text-6xl font-black text-white drop-shadow-[0_0_20px_rgba(45,212,191,0.5)] relative z-10"
              id="stat-xp"
            >
              0
            </p>
            <p
              class="text-[10px] uppercase opacity-70 text-teal-100 mt-3 tracking-[0.3em] relative z-10"
            >
              Total Level XP
            </p>
            <div
              class="absolute inset-0 bg-teal-500/5 blur-3xl rounded-full"
            ></div>
          </div>
        </div>

        <button
          id="btn-export"
          class="w-full bg-white/5 border border-white/10 py-4 rounded-2xl flex justify-center items-center gap-3 text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition-colors active:scale-95"
        >
          <i class="ph ph-download-simple text-xl"></i> Выгрузить CSV
        </button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
