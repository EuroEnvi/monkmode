<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Monk Mode | Трекер</title>
    <link rel="manifest" href="manifest.json" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  </head>
  <body
    class="cloud-tunnel min-h-screen text-white font-sans flex items-center justify-center p-4"
  >
    <main
      id="app-container"
      class="holographic-glass w-full max-w-md rounded-3xl p-6 shadow-2xl relative z-10 flex flex-col app-height"
    >
      <header class="mb-6 flex-shrink-0">
        <div class="flex justify-between items-end mb-2">
          <div>
            <h1 class="text-2xl font-bold tracking-wider uppercase">
              Monk Mode
            </h1>
            <p class="text-sm opacity-70" id="current-date">Загрузка...</p>
          </div>
          <div class="text-right">
            <span class="text-3xl font-bold text-teal-300" id="total-xp"
              >0</span
            >
            <span class="text-xs opacity-70 block uppercase tracking-tighter"
              >Total XP</span
            >
          </div>
        </div>

        <div
          class="h-3 w-full bg-white/10 rounded-full overflow-hidden backdrop-blur-sm mt-4"
        >
          <div
            id="progress-fill"
            class="h-full bg-gradient-to-r from-teal-400 to-emerald-400 w-0 rounded-full"
          ></div>
        </div>
        <p
          class="text-right text-[10px] mt-1 opacity-60 uppercase tracking-widest"
          id="daily-progress-text"
        >
          0% выполнено
        </p>
      </header>

      <div
        class="flex-1 overflow-y-auto pr-1 custom-scrollbar"
        id="habits-list"
      ></div>

      <footer class="mt-6 flex gap-3 flex-shrink-0">
        <button
          id="btn-export"
          class="flex-1 glass-btn py-4 rounded-2xl flex justify-center items-center gap-2 text-sm transition-all active:scale-95"
        >
          <i class="ph ph-download-simple text-xl"></i> Отчет
        </button>
        <button
          id="btn-add"
          class="flex-1 bg-teal-500/80 active:bg-teal-400 py-4 rounded-2xl flex justify-center items-center gap-2 text-sm font-bold transition-all shadow-[0_0_20px_rgba(45,212,191,0.3)] active:scale-95"
        >
          <i class="ph ph-plus-bold text-xl"></i> Добавить
        </button>
      </footer>
    </main>

    <div
      id="modal"
      class="fixed inset-0 bg-black/70 backdrop-blur-md z-50 hidden flex items-center justify-center p-4 opacity-0"
    >
      <div
        class="holographic-glass w-full max-w-sm rounded-3xl p-8 transform scale-95"
        id="modal-content"
      >
        <h2 class="text-xl font-bold mb-6 text-center" id="modal-title">
          Новая задача
        </h2>

        <div class="space-y-4">
          <div>
            <label class="text-[10px] uppercase opacity-50 ml-1 mb-1 block"
              >Название активности</label
            >
            <input
              type="text"
              id="habit-title"
              placeholder="Например: Коддинг"
              class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none focus:border-teal-400/50 transition-colors"
            />
          </div>
          <div>
            <label class="text-[10px] uppercase opacity-50 ml-1 mb-1 block"
              >Награда в XP</label
            >
            <input
              type="number"
              id="habit-xp"
              placeholder="50"
              class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none focus:border-teal-400/50 transition-colors"
            />
          </div>
        </div>

        <div class="flex flex-col gap-3 mt-8">
          <button
            id="btn-save"
            class="w-full bg-teal-500 py-4 rounded-xl font-bold shadow-lg transition-transform active:scale-95"
          >
            Подтвердить
          </button>
          <div class="flex gap-3">
            <button
              id="btn-delete"
              class="hidden flex-1 bg-red-500/10 text-red-400 border border-red-500/20 py-3 rounded-xl text-sm transition-colors"
            >
              Удалить
            </button>
            <button
              id="btn-cancel"
              class="flex-1 bg-white/5 py-3 rounded-xl text-sm hover:bg-white/10 transition-colors"
            >
              Отмена
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
