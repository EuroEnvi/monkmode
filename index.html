<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Monk Mode | Трекер</title>
    <link rel="manifest" href="manifest.json" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  </head>
  <body class="cloud-tunnel text-white font-sans">
    <main
      id="app-container"
      class="holographic-glass app-wrapper relative z-10 flex flex-col p-6 shadow-2xl"
    >
      <header class="mb-4 flex-shrink-0">
        <div class="flex justify-between items-start mb-2">
          <div class="pt-2">
            <h1 class="text-2xl font-bold tracking-wider uppercase">
              Monk Mode
            </h1>
            <p class="text-sm opacity-70" id="current-date">Сегодня</p>
          </div>
          <div class="text-right">
            <div
              class="flex justify-end items-center gap-3 cursor-pointer group"
              id="btn-stats"
            >
              <span class="text-3xl font-bold text-teal-300" id="total-xp"
                >0</span
              >
              <div
                class="bg-white/5 p-2 rounded-xl border border-white/10 group-hover:bg-white/10 transition-colors"
              >
                <i class="ph ph-chart-line-up text-xl text-teal-300"></i>
              </div>
            </div>
            <span
              class="text-[10px] opacity-70 block uppercase tracking-widest mt-1 pr-14"
              >Total XP</span
            >
          </div>
        </div>

        <div
          class="h-2 w-full bg-white/10 rounded-full overflow-hidden backdrop-blur-sm mt-4"
        >
          <div
            id="progress-fill"
            class="h-full bg-gradient-to-r from-teal-400 to-emerald-400 w-0 rounded-full"
          ></div>
        </div>
        <p
          class="text-right text-[10px] mt-1 opacity-60 uppercase tracking-widest"
          id="daily-progress-text"
        >
          0% выполнено
        </p>
      </header>

      <div class="flex-1 custom-scrollbar pr-1 pb-4" id="habits-list"></div>

      <footer class="mt-2 flex-shrink-0 pt-2">
        <button
          id="btn-add"
          class="w-full bg-teal-500/80 hover:bg-teal-400 py-4 rounded-2xl flex justify-center items-center gap-2 text-base font-bold transition-all shadow-[0_0_20px_rgba(45,212,191,0.2)] active:scale-95"
        >
          <i class="ph ph-plus-bold text-xl"></i> Новая задача
        </button>
      </footer>
    </main>

    <div
      id="modal"
      class="fixed inset-0 bg-black/70 backdrop-blur-md z-[60] hidden flex items-center justify-center p-4 opacity-0"
    >
      <div
        class="holographic-glass w-full max-w-sm rounded-3xl p-8 transform scale-95"
        id="modal-content"
      >
        <h2 class="text-xl font-bold mb-6 text-center" id="modal-title">
          Новая задача
        </h2>
        <div class="space-y-4">
          <div>
            <label class="text-[10px] uppercase opacity-50 ml-1 mb-1 block"
              >Название</label
            >
            <input
              type="text"
              id="habit-title"
              class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none focus:border-teal-400/50 transition-colors"
            />
          </div>
          <div>
            <label class="text-[10px] uppercase opacity-50 ml-1 mb-1 block"
              >Награда XP</label
            >
            <input
              type="number"
              id="habit-xp"
              class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none focus:border-teal-400/50 transition-colors"
            />
          </div>
        </div>
        <div class="flex flex-col gap-3 mt-8">
          <button
            id="btn-save"
            class="w-full bg-teal-500 py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-transform"
          >
            Сохранить
          </button>
          <div class="flex gap-3">
            <button
              id="btn-delete"
              class="hidden flex-1 bg-red-500/10 text-red-400 border border-red-500/20 py-3 rounded-xl text-sm transition-colors"
            >
              Удалить
            </button>
            <button
              id="btn-cancel"
              class="flex-1 bg-white/5 py-3 rounded-xl text-sm transition-colors"
            >
              Отмена
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      id="stats-modal"
      class="fixed inset-0 bg-black/80 backdrop-blur-lg z-50 hidden flex items-center justify-center p-4 opacity-0"
    >
      <div
        class="holographic-glass w-full max-w-sm rounded-3xl p-6 transform scale-95"
        id="stats-content"
      >
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-2xl font-bold uppercase tracking-wider">Сводка</h2>
          <button
            id="btn-close-stats"
            class="text-white/50 hover:text-white transition-colors bg-white/5 p-2 rounded-full"
          >
            <i class="ph ph-x text-xl block"></i>
          </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
          <div
            class="bg-white/5 border border-white/10 rounded-2xl p-4 text-center"
          >
            <i class="ph-fill ph-check-circle text-teal-400 text-3xl mb-2"></i>
            <p class="text-3xl font-bold" id="stat-completed">0</p>
            <p class="text-[10px] uppercase opacity-50 mt-1">Завершено задач</p>
          </div>
          <div
            class="bg-white/5 border border-white/10 rounded-2xl p-4 text-center"
          >
            <i
              class="ph-fill ph-calendar-check text-emerald-400 text-3xl mb-2"
            ></i>
            <p class="text-3xl font-bold" id="stat-days">0</p>
            <p class="text-[10px] uppercase opacity-50 mt-1">Активных дней</p>
          </div>
          <div
            class="col-span-2 bg-gradient-to-br from-teal-500/20 to-emerald-500/20 border border-teal-500/30 rounded-2xl p-6 text-center relative overflow-hidden"
          >
            <i
              class="ph-fill ph-lightning text-teal-300 text-4xl mb-2 relative z-10"
            ></i>
            <p
              class="text-5xl font-black text-teal-300 drop-shadow-[0_0_15px_rgba(45,212,191,0.8)] relative z-10"
              id="stat-xp"
            >
              0
            </p>
            <p
              class="text-[10px] uppercase opacity-80 text-teal-100 mt-2 tracking-widest relative z-10"
            >
              Накоплено XP
            </p>
            <div
              class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 bg-teal-400/20 blur-2xl rounded-full"
            ></div>
          </div>
        </div>

        <button
          id="btn-export"
          class="w-full bg-white/5 border border-white/10 py-4 rounded-xl flex justify-center items-center gap-2 text-sm hover:bg-white/10 transition-colors active:scale-95"
        >
          <i class="ph ph-download-simple text-xl"></i> Выгрузить историю (CSV)
        </button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
